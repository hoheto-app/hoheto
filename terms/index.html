<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hoheto — 利用規約</title>
<link rel="icon" type="image/png" href="../favicon.png">
<link rel="apple-touch-icon" href="../favicon.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700;900&family=Inconsolata:wght@300;400;600&display=swap');
 
:root {
  --paper: #f5f0e4;
  --ink: #1a1510;
  --ink2: #3a3020;
  --ink3: #6a5a40;
  --ink4: #9a8a70;
  --rule: #cec6b0;
  --gold: #9a7a2a;
  --gold2: #c4a050;
  --teal: #2a6a5a;
}
 
* { box-sizing: border-box; margin: 0; padding: 0; }
 
body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Noto Serif JP', serif;
  min-height: 100vh;
  padding: 60px 20px 100px;
  background-image: repeating-linear-gradient(
    0deg, transparent, transparent 27px,
    rgba(180,160,120,0.10) 28px
  );
}
 
.container {
  max-width: 560px;
  margin: 0 auto;
}
 
.back-link {
  display: inline-block;
  margin-bottom: 32px;
  font-family: 'Inconsolata', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  color: var(--ink4);
  text-decoration: none;
}
.back-link:hover { color: var(--gold); }
 
h1 {
  font-size: 1.4rem;
  font-weight: 700;
  margin-bottom: 8px;
  letter-spacing: 0.04em;
}
 
.updated {
  font-family: 'Inconsolata', monospace;
  font-size: 0.65rem;
  color: var(--ink4);
  letter-spacing: 0.1em;
  margin-bottom: 32px;
}
 
.philosophy {
  border: 1px solid var(--rule);
  background: rgba(255,255,255,0.4);
  padding: 20px 24px;
  margin-bottom: 36px;
  font-size: 0.92rem;
  line-height: 2;
  color: var(--ink2);
}
 
h2 {
  font-size: 1rem;
  font-weight: 700;
  margin: 32px 0 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--rule);
}
 
ul {
  list-style: none;
  margin-bottom: 8px;
}
li {
  font-size: 0.88rem;
  line-height: 2;
  color: var(--ink2);
  padding-left: 1.2em;
  position: relative;
}
li::before {
  content: '・';
  position: absolute;
  left: 0;
  color: var(--gold2);
}
 
p.note {
  font-size: 0.82rem;
  line-height: 1.9;
  color: var(--ink3);
  margin-top: 14px;
}
</style>
</head>
<body>
 
<div class="container">
 
  <a href="../login" class="back-link">← もどる</a>
 
  <h1>Hoheto 利用規約</h1>
  <div class="updated">最終更新：2026年</div>
 
  <div class="philosophy">
    Hohetoは、関心がゆっくり伝わる場所を目指しています。<br>
    誰かに届けるためではなく、自分のために書いてください。
  </div>
 
  <h2>禁止事項</h2>
  <p class="note" style="margin-top:0;margin-bottom:14px">以下の行為を禁止します。</p>
  <ul>
    <li>法令に違反する投稿、または違法行為を助長する投稿</li>
    <li>他者への誹謗中傷、嫌がらせ、差別的な表現</li>
    <li>スパム行為（無関係な宣伝、自動投稿、大量の同一内容投稿）</li>
    <li>他者になりすます行為</li>
    <li>著作権その他の知的財産権を侵害する投稿</li>
    <li>許可なく他者の個人情報を公開する行為</li>
  </ul>
  <p class="note">これらに該当すると判断した投稿は、予告なく削除する場合があります。</p>
 
</div>
 
</body>
</html>
